<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDTECH - Simulador de Quadros</title>
    <style>
        /* CSS PROFISSIONAL */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        :root {
            --primary-blue: #007bff;
            --dark-blue: #0056b3;
            --light-blue: #e7f1ff;
            --bg-gradient: linear-gradient(135deg, #001f3f 0%, #007bff 100%);
            --card-bg: #ffffff;
            --text-color: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header { margin-bottom: 30px; text-align: center; color: white; }
        header h1 { font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }

        .container { width: 100%; max-width: 600px; }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        label { display: block; margin: 15px 0 5px; font-weight: 600; color: var(--dark-blue); font-size: 0.9rem; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--light-blue);
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            background: #f8f9fa;
        }

        input:focus, select:focus { border-color: var(--primary-blue); }

        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }

        #listaTUEs { margin-bottom: 10px; }
        .tue-item {
            background: var(--light-blue);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #b3d7ff;
            animation: fadeIn 0.3s ease;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        button:hover { background: var(--dark-blue); transform: translateY(-2px); }

        .result-container {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            background: #fdfdfd;
            border: 1px solid #ddd;
        }

        .card-result { line-height: 1.6; color: #444; }
        .hidden { display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Simulação Visual do Quadro */
        .quadro-visual {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 15px;
            padding: 10px;
            background: #eee;
            border-radius: 8px;
            border: 2px solid #ccc;
        }
        .disjuntor-bloco {
            width: 30px;
            height: 60px;
            background: white;
            border: 2px solid #999;
            border-top: 5px solid var(--primary-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Simulador de Quadro FDTECH</h1>
    </header>

    <main class="container">
        <div class="card">
            <label>💡 Iluminação (Pontos totais)</label>
            <input type="number" id="iluminacao" placeholder="Ex: 10">

            <label>🔌 Tomadas Comuns (TUGs)</label>
            <input type="number" id="tomadasSimples" placeholder="Ex: 15">

            <hr>

            <label>⚡ Equipamentos Pesados (TUEs)</label>
            <div id="listaTUEs"></div>
            <select id="seletorEquipamento">

            </select>

            <hr>

            <label>📦 Capacidade do Quadro (Disjuntores)</label>
            <input type="number" id="capacidadeDoQuadro" placeholder="Ex: 12">

            <hr>

            <label>⚡ Voltagem do Quadro</label>
            <select id="voltagemQuadro">
                <option value="127">127V</option>
                <option value="220">220V</option>
            </select>

            <button id="btnCalcularQuadro">Gerar Configuração Técnica</button>

            <div id="resultadoQuadro" class="result-container hidden">
                <h3>Sugestão de Montagem:</h3>
                <div id="res-quadro" class="card-result"></div>
                <div id="quadroVisual" class="quadro-visual"></div>
            </div>
            
        </div>
    </main>
    <script src="quadro.js"></script>
</body>
</html>
